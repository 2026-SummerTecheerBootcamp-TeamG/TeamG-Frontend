<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Pretendard 웹폰트: 기기에 폰트가 없으면 굴림체로 폴백되던 문제의 근본 해결
         (dynamic-subset = 화면에 쓰인 글자만 내려받아 한글 폰트치고 가벼움) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <!-- 플래닝 룸 상단 배경 사진을 브라우저가 "한가할 때" 미리 받아둔다.
         prefetch는 preload와 달리 우선순위가 가장 낮아 현재 화면 로딩을 방해하지 않음.
         온보딩 구경을 마치고 넘어갈 때쯤엔 캐시에 있어 사진 로딩 게이트가 즉시 열림 -->
    <link rel="prefetch" href="/ex9.jpg" as="image" />
    <title>TripCanvas — AI 여행 플래너</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
